# DSMS 反向代理（上汽大众研发数据安全治理工作台）
#
# 安装（ECS）：
#   scp deploy/nginx-dsms-locations.conf ecs-main:/tmp/dsms-locations.conf
#   ssh ecs-main "install -m 644 /tmp/dsms-locations.conf /etc/nginx/snippets/dsms-locations.conf && nginx -t && systemctl reload nginx"
#
# 在 /etc/nginx/sites-enabled/default 的 server {} 内、
# ecs-service-manage-generated-locations.conf 之前加入：
#   include /etc/nginx/snippets/dsms-locations.conf;
#
# 后端：127.0.0.1:8002（compose HOST_PORT）
# 公网：http://47.116.180.173/tools/dsms/

# 无尾斜杠 → 带尾斜杠（与 Vite base /tools/dsms/ 一致）
location = /tools/dsms {
    return 301 /tools/dsms/;
}

# 健康检查（便于监控，不依赖 SPA）
location = /tools/dsms/healthz {
    proxy_pass http://127.0.0.1:8002/healthz;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 3s;
    proxy_read_timeout 10s;
}

# 门户静态 + API（路径前缀剥离后转发到 uvicorn）
location /tools/dsms/ {
    client_max_body_size 50m;
    proxy_pass http://127.0.0.1:8002/;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Prefix /tools/dsms;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    proxy_buffering on;
    proxy_buffer_size 16k;
    proxy_buffers 8 32k;
}
