services:
  dsms:
    container_name: ${SERVICE_NAME}
    image: ${IMAGE}
    restart: always
    ports:
      - "${HOST_PORT}:${CONTAINER_PORT}"
    env_file:
      - .env.runtime
    environment:
      STATIC_DIR: /app/static
      DATABASE_URL: sqlite:////app/data/dsms.db
      DSMS_UPLOAD_ROOT: /app/data/uploads
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
